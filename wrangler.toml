name = "mictestcamcf"
main = ".open-next/worker.js"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[[services]]
binding = "WORKER_SELF_REFERENCE"
service = "mictestcamcf"

[images]
binding = "IMAGES"

[[d1_databases]]
binding = "DB"
database_name = "mictestcamcf"
database_id = "af2a4758-4098-4587-81fd-068e59b6badf"

[vars]
NEXT_PUBLIC_APP_URL = "https://mictestcam.com"
